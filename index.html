<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TJC Editor</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
    font-family: monospace;
}

header {
    padding: 10px;
    background: #020617;
    border-bottom: 1px solid #1e293b;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    background: #38bdf8;
    border: none;
    padding: 8px 15px;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
}

button:hover {
    background: #0ea5e9;
}

#editor {
    width: 100%;
    height: 65vh;
    background: #020617;
    color: #38bdf8;
    border: none;
    outline: none;
    padding: 15px;
    font-size: 15px;
    resize: none;
    line-height: 1.5;
}

#output {
    padding: 15px;
    background: #000;
    color: #22c55e;
    height: 25vh;
    overflow-y: auto;
    border-top: 1px solid #1e293b;
}
</style>
</head>

<body>

<header>
    <h3>🚀 TJC Editor</h3>
    <button onclick="runCode()">▶ Run</button>
</header>

<textarea id="editor">
x = 1

loop#x(1,9):
    print#x

print#x
</textarea>

<div id="output">Output will appear here...</div>

<script src="interpreter.js"></script>

<script>
let indent = 0;
const editor = document.getElementById("editor");

// ======================
// EDITOR BEHAVIOUR
// ======================
editor.addEventListener("keydown", function(e) {

    // ENTER → auto indent
    if (e.key === "Enter") {
        e.preventDefault();

        let start = editor.selectionStart;
        let value = editor.value;

        let before = value.substring(0, start);
        let after = value.substring(start);

        let indentSpaces = "    ".repeat(indent);

        editor.value = before + "\n" + indentSpaces + after;
        editor.selectionStart = editor.selectionEnd = start + 1 + indentSpaces.length;
    }

    // ":" → increase indent
    if (e.key === ":") {
        indent++;
    }

    // ";" → decrease indent (your shortcut)
    if (e.key === ";") {
        indent = Math.max(0, indent - 1);
    }

    // TAB → manual indent
    if (e.key === "Tab") {
        e.preventDefault();
        let start = editor.selectionStart;

        editor.value =
            editor.value.substring(0, start) +
            "    " +
            editor.value.substring(start);

        editor.selectionStart = editor.selectionEnd = start + 4;
    }
});


// ======================
// RUN BUTTON
// ======================
function runCode() {
    const code = editor.value;
    const outputDiv = document.getElementById("output");

    try {
        // runTJC must come from interpreter.js
        let result = runTJC(code);
        outputDiv.textContent = result;
    } catch (err) {
        outputDiv.textContent = "Error: " + err;
    }
}
</script>

</body>
</html>
